<!DOCTYPE html>
<html lang="uk">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Компоненти</title>
    <link rel="stylesheet" href="main.css">
</head>

<body>

            <div class="main__wrapper">
                <div class="custom-block custom-block_theme_white container-1770">
                    <div class="custom-block__title">Кнопки фільтрів</div>
                    <button class="btn btn_h_36 btn_color_light-blue" type="button">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M19 12H5M12 5V19" stroke="#295FAF" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />

                        <span>№ закупівлі</span>
                    </button>
                    <button class="btn btn_h_36 btn_color_light-blue" type="button" disabled>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M19 12H5M12 5V19" stroke="#295FAF" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                        <span>№ закупівлі</span>

                </div>
            </div>
        </main>
